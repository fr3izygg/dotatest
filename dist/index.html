ана и дает возможность возродиться на месте смерти?",correctAnswer:"Аегис / Aegis of the Immortal",difficulty:"easy",type:"text",category:"Предметы"},{id:"q7",text:"Как зовут героя, способность которого «Omnislash» является его ультимативной атакой?",correctAnswer:"Джаггернаут / Juggernaut",difficulty:"easy",type:"text",category:"Герои"},{id:"q8",text:"Какая способность героя Axe наносит урон всем ближайшим врагам и заставляет их атаковать его?",correctAnswer:"Berserker's Call / Зов берсерка",difficulty:"easy",type:"text",category:"Способности"},{id:"q9",text:"Как называется способность Invoker, при которой он призывает солнечный удар с огненным уроном по одной цели?",correctAnswer:"Sun Strike / Солнечный удар",difficulty:"medium",type:"text",category:"Способности"},{id:"q10",text:"Какой герой имеет пассивную способность «Momento» и может перейти в другую форму после смерти, продолжая сражаться?",correctAnswer:"Wraith King / Король-призрак",difficulty:"medium",type:"text",category:"Герои"},{id:"q11",text:"Сколько заклинаний может скомбинировать Invoker всего (уникальных)?",correctAnswer:"14",difficulty:"medium",type:"text",category:"Герои"},{id:"q12",text:"Как называется предмет, который телепортирует героя в любую точку карты через 3 секунды каста?",correctAnswer:"Town Portal Scroll / ТП / Свиток телепортации",difficulty:"medium",type:"text",category:"Предметы"},{id:"q13",text:"Какой предмет дает герою невидимость при стоянии на месте и называется «Серп» в народе?",correctAnswer:"Shadow Blade / Клинок тени",difficulty:"medium",type:"text",category:"Предметы"},{id:"q14",text:"Как называется механика когда ваш герой атакует крипа последним ударом чтобы получить золото?",correctAnswer:"Ласт хит / Last hit",difficulty:"medium",type:"text",category:"Механики"},{id:"q15",text:"Какой герой известен своей ультой «Black Hole», засасывающей всех врагов в одну точку?",correctAnswer:"Enigma / Энигма",difficulty:"medium",type:"text",category:"Герои"},{id:"q16",text:"Что такое «
